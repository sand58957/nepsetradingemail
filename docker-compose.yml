services:
  nginx:
    image: nginx:alpine
    container_name: nepse_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      # Self-hosted blog featured images (replaces external Unsplash URLs)
      - ./uploads/blog-images:/usr/share/nginx/blog-images:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      listmonk:
        condition: service_started
    mem_limit: 256m
    networks:
      - nepse
      # Cross-project network so nginx can proxy /hostingnepals.* to hn-frontend
      # (Hosting Nepal lives in /root/Hosting_Nepal with its own compose project).
      - hosting_nepal_hn-network

  certbot:
    image: certbot/certbot
    container_name: nepse_certbot
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nepse_frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - API_URL=http://backend:8080/api/auth
      - NEXT_PUBLIC_API_URL=https://nepalfillings.com/api
      # Internal Docker network address for SSR fetches — avoids round-tripping
      # through Cloudflare back to the same origin (saves 200–500 ms / page render).
      - INTERNAL_API_URL=http://backend:8080/api
      - NEXTAUTH_URL=https://nepalfillings.com
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    healthcheck:
      # Use 127.0.0.1 (not localhost): busybox wget resolves localhost to ::1
      # (IPv6) but Next.js standalone binds IPv4-only, so localhost is refused.
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    mem_limit: 1g
    networks:
      - nepse

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nepse_backend
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://${DB_USER:-listmonk}:${DB_PASSWORD}@db:5432/${DB_NAME:-listmonk}?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - LISTMONK_API_URL=http://listmonk:9000/api
      - LISTMONK_ADMIN_USER=${LISTMONK_API_USER:-api_backend}
      - LISTMONK_ADMIN_PASSWORD=${LISTMONK_API_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=https://nepalfillings.com
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BUNNY_CDN_STORAGE_URL=https://sg.storage.bunnycdn.com
      - BUNNY_CDN_STORAGE_ZONE=nepalfilling
      - BUNNY_CDN_STORAGE_KEY=${BUNNY_CDN_STORAGE_KEY}
      - BUNNY_CDN_PULL_URL=https://my-pull-zone-name-nepalfilling.b-cdn.net
      - DKIM_KEYS_DIR=/opt/dkim-keys
    volumes:
      - /opt/dkim-keys:/opt/dkim-keys
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      listmonk:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 512m
    networks:
      - nepse

  listmonk:
    image: listmonk/listmonk:latest
    container_name: nepse_listmonk
    hostname: nepsetrading.com
    restart: unless-stopped
    expose:
      - "9000"
    command: >
      sh -c "./listmonk --install --idempotent --yes --config '' &&
             ./listmonk --upgrade --yes --config '' &&
             ./listmonk --config ''"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - LISTMONK_app__address=0.0.0.0:9000
      - LISTMONK_db__host=db
      - LISTMONK_db__port=5432
      - LISTMONK_db__user=${DB_USER:-listmonk}
      - LISTMONK_db__password=${DB_PASSWORD}
      - LISTMONK_db__database=${DB_NAME:-listmonk}
      - LISTMONK_db__ssl_mode=disable
      - LISTMONK_app__admin_username=${LISTMONK_ADMIN_USER:-admin}
      - LISTMONK_app__admin_password=${LISTMONK_ADMIN_PASSWORD}
    volumes:
      - listmonk-uploads:/listmonk/uploads
    mem_limit: 512m
    networks:
      - nepse

  db:
    image: postgres:17-alpine
    container_name: nepse_db
    restart: unless-stopped
    # No host port mapping: db is only consumed in-network by backend/listmonk.
    # For ad-hoc ops access use `docker exec nepse_db psql ...` instead of exposing 5432.
    environment:
      - POSTGRES_USER=${DB_USER:-listmonk}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-listmonk}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-listmonk}"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 2g
    networks:
      - nepse

  redis:
    image: redis:7-alpine
    container_name: nepse_redis
    restart: unless-stopped
    # 256 MB cap with allkeys-lru — evicts least-recently-used keys when full,
    # so accidental unbounded growth in cache keys can never OOM the box.
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --activedefrag yes
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redisdata:/data
    mem_limit: 320m
    networks:
      - nepse

networks:
  nepse:
  # Declared as external because it's owned by the Hosting Nepal compose project.
  # Without this, recreating nginx detaches it from hn-frontend's network and
  # nginx fails to start with "host not found in upstream hn-frontend".
  hosting_nepal_hn-network:
    external: true

volumes:
  pgdata:
  redisdata:
  listmonk-uploads:
