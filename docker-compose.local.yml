# Local development — only DB + Redis + Listmonk
# Usage: docker compose -f docker-compose.local.yml up -d
#
# Host ports avoid natively-installed services (Postgres on 5433, Redis on 6379):
#   Postgres -> localhost:5435   Redis -> localhost:6381   Listmonk -> localhost:9000
# These must match DATABASE_URL / REDIS_URL / LISTMONK_API_URL in backend/.env
# (see backend/.env.example).
services:
  db:
    image: postgres:17-alpine
    container_name: nepse_local_db
    environment:
      POSTGRES_USER: listmonk
      POSTGRES_PASSWORD: listmonk
      POSTGRES_DB: listmonk
    ports:
      - "5435:5432" # must match DATABASE_URL in backend/.env
    volumes:
      - local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nepse_local_redis
    ports:
      - "6381:6379" # must match REDIS_URL in backend/.env
    command: redis-server --appendonly yes
    volumes:
      - local_redisdata:/data

  listmonk:
    image: listmonk/listmonk:v3.0.0
    container_name: nepse_local_listmonk
    depends_on:
      db:
        condition: service_healthy
    environment:
      - LISTMONK_app__address=0.0.0.0:9000
      - LISTMONK_app__admin_username=admin
      - LISTMONK_app__admin_password=admin
      - LISTMONK_db__host=db
      - LISTMONK_db__port=5432
      - LISTMONK_db__user=listmonk
      - LISTMONK_db__password=listmonk
      - LISTMONK_db__database=listmonk
      - LISTMONK_db__ssl_mode=disable
    ports:
      - "9000:9000"
    volumes:
      - local_listmonk_uploads:/listmonk/uploads
    command: >
      sh -c "yes | ./listmonk --install && yes | ./listmonk --upgrade && ./listmonk"

volumes:
  local_pgdata:
  local_redisdata:
  local_listmonk_uploads:
