# ---------------------------------------------------------------
# HTTP -> HTTPS redirect
# ---------------------------------------------------------------
server {
    listen 80;
    server_name nepalfillings.com www.nepalfillings.com;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------
# HTTPS — main server block
# ---------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name nepalfillings.com www.nepalfillings.com;

    # ------ SSL / TLS ------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/nepalfillings.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nepalfillings.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ------ General settings -----------------------------------
    client_max_body_size 50M;

    # Common proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ------ NextAuth routes → Next.js frontend ------------------
    # Only NextAuth-specific routes go to frontend; Go backend's /api/auth/login etc. stay with backend
    location ~ ^/api/auth/(session|providers|csrf|callback|signin|signout|error|_log) {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # ------ Backend API ----------------------------------------
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ------ Listmonk public routes (email tracking / webhooks) -
    # Subscription pages
    location /subscription/ {
        proxy_pass http://listmonk:9000;
    }

    # Click/open tracking links
    location /link/ {
        proxy_pass http://listmonk:9000;
    }

    # Campaign view-in-browser
    location /campaign/ {
        proxy_pass http://listmonk:9000;
    }

    # Uploaded media (images in emails)
    location /uploads/ {
        proxy_pass http://listmonk:9000;
    }

    # Public campaign archives
    location /archive {
        proxy_pass http://listmonk:9000;
    }

    # Incoming webhooks (bounce, complaint handlers)
    location /webhooks/ {
        proxy_pass http://listmonk:9000;
    }

    # ------ Frontend (Next.js catch-all) -----------------------
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
