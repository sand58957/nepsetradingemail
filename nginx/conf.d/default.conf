# ===============================================================
# Global tuning (runs at http {} context — applies to all servers)
# ===============================================================

# Upstreams with keepalive (avoids new TCP handshake per request)
upstream frontend_app {
    server frontend:3000;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream backend_app {
    server backend:8080;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

upstream listmonk_app {
    server listmonk:9000;
    keepalive 16;
}

# Cloudflare real-IP — strip CF proxy and use the real client IP
# Subset of Cloudflare's published IPv4 ranges (https://www.cloudflare.com/ips-v4)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

# Compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
# Serve pre-compressed *.gz assets when present (Next.js build output) instead of
# re-gzipping every request. (For Brotli, swap nginx:alpine for an image built with
# ngx_brotli and add: brotli on; brotli_static on; brotli_types ...;)
gzip_static on;
gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml application/xml+rss
    application/rss+xml application/atom+xml application/x-font-ttf
    image/svg+xml font/opentype font/woff font/woff2;

# HTTP-level proxy cache for selected routes
proxy_cache_path /var/cache/nginx/app
    levels=1:2
    keys_zone=app_cache:50m
    max_size=1g
    inactive=60m
    use_temp_path=off;

# Rate-limit zones (use real client IP, not the CF edge IP)
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=public_zone:10m rate=60r/s;

# Better log format (timing for diagnostics)
log_format perf '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                'rt=$request_time urt=$upstream_response_time '
                'cs=$upstream_cache_status';

# ===============================================================
# HTTP -> HTTPS redirect (always to non-www)
# ===============================================================
server {
    listen 80;
    server_name nepalfillings.com www.nepalfillings.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://nepalfillings.com$request_uri;
    }
}

# ===============================================================
# HTTPS — www to non-www redirect
# ===============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name www.nepalfillings.com;

    ssl_certificate     /etc/letsencrypt/live/nepalfillings.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nepalfillings.com/privkey.pem;

    return 301 https://nepalfillings.com$request_uri;
}

# ===============================================================
# HTTPS — main server block
# ===============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name nepalfillings.com;

    access_log /var/log/nginx/access.log perf;

    # ------ SSL / TLS ------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/nepalfillings.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nepalfillings.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — saves a handshake round-trip for direct-to-origin clients.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ------ Security headers -----------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Content-Security-Policy in report-only first so AdSense/MUI inline styles are
    # observed (not broken). Review violation reports, then switch to enforcing
    # (Content-Security-Policy) once clean.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://pagead2.googlesyndication.com https://*.googlesyndication.com https://*.google.com https://*.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https:; frame-src https://googleads.g.doubleclick.net https://*.google.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self';" always;

    # ------ General settings -----------------------------------
    client_max_body_size 50M;

    # Common proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Use HTTP/1.1 + close Connection header to engage upstream keepalive
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ------ NextAuth routes → Next.js frontend ------------------
    location ~ ^/api/auth/(session|providers|csrf|callback|signin|signout|error|_log) {
        proxy_pass http://frontend_app;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # ------ Backend API (Go) -----------------------------------
    # Public read-mostly endpoints — short-cache at edge to absorb crawler traffic
    location ~ ^/api/public/(blog|sitemap)/ {
        limit_req zone=api_zone burst=40 nodelay;
        proxy_pass http://backend_app;
        proxy_cache app_cache;
        proxy_cache_valid 200 60s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_background_update on;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /api/ {
        limit_req zone=api_zone burst=40 nodelay;
        proxy_pass http://backend_app;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ------ Static text files at site root (cache at edge) ------
    # These are SEO/policy files served by Next.js but never change frequently.
    location = /robots.txt {
        proxy_pass http://frontend_app;
        proxy_cache app_cache;
        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }
    location = /ads.txt {
        proxy_pass http://frontend_app;
        proxy_cache app_cache;
        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }
    location = /llms.txt {
        proxy_pass http://frontend_app;
        proxy_cache app_cache;
        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }
    location = /sitemap.xml {
        proxy_pass http://frontend_app;
        proxy_cache app_cache;
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # ------ Self-hosted blog featured images -------------------
    location /blog-images/ {
        alias /usr/share/nginx/blog-images/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ------ Next.js static assets (long cache, immutable) ------
    location /_next/static/ {
        proxy_pass http://frontend_app;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # ------ Site images (long cache) ---------------------------
    location /images/ {
        proxy_pass http://frontend_app;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # ------ Blog HTML (short edge cache, stale-while-revalidate)
    location ^~ /blog {
        limit_req zone=public_zone burst=80 nodelay;
        proxy_pass http://frontend_app;
        proxy_cache app_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_background_update on;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 60s;
    }

    # ------ Listmonk public routes (email tracking / webhooks) -
    location /subscription/ { proxy_pass http://listmonk_app; }
    location /link/         { proxy_pass http://listmonk_app; }
    location /campaign/     { proxy_pass http://listmonk_app; }
    location /uploads/      { proxy_pass http://listmonk_app; }
    location /archive       { proxy_pass http://listmonk_app; }
    location /webhooks/     { proxy_pass http://listmonk_app; }

    # ------ Frontend (Next.js catch-all) -----------------------
    location / {
        limit_req zone=public_zone burst=80 nodelay;
        proxy_pass http://frontend_app;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
